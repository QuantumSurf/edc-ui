apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kmx-edc-ui.fullname" . }}-secret
  labels:
    {{- include "kmx-edc-ui.labels" . | nindent 4 }}
type: Opaque
data:
  edc-api-key: {{ .Values.edc.apiKey | b64enc | quote }}
  # 프로덕션 필수 시크릿 — 미설정 시 helm install/template 이 즉시 실패한다(fail-closed).
  jwt-secret: {{ required "secrets.jwtSecret is required (>=32 chars, not a public default)" .Values.secrets.jwtSecret | b64enc | quote }}
  hub-apikey-secret: {{ required "secrets.hubApikeySecret is required (AES-256-GCM at-rest key)" .Values.secrets.hubApikeySecret | b64enc | quote }}
  platform-vault-token: {{ required "secrets.platformVaultToken is required (never 'root')" .Values.secrets.platformVaultToken | b64enc | quote }}
  platform-database-url: {{ required "secrets.platformDatabaseUrl is required (not the dev default)" .Values.secrets.platformDatabaseUrl | b64enc | quote }}
  {{- if .Values.oidc.enabled }}
  oidc-client-secret: {{ required "secrets.oidcClientSecret is required when oidc.enabled=true" .Values.secrets.oidcClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.seedAdminPassword }}
  seed-admin-password: {{ .Values.secrets.seedAdminPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.seedOperatorPassword }}
  seed-operator-password: {{ .Values.secrets.seedOperatorPassword | b64enc | quote }}
  {{- end }}
  {{- if not .Values.postgresql.enabled }}
  {{- if not .Values.externalDatabase.existingSecret }}
  password: {{ .Values.externalDatabase.password | b64enc | quote }}
  {{- end }}
  {{- end }}
