{{- if .Values.networkPolicy.enabled }}
# 파드 인바운드 제한(방어심층) — 인그레스 컨트롤러와 모니터링(스크레이퍼) 네임스페이스만
# 앱 포트에 도달하게 한다. /metrics 는 무인증이라, 외부 노출은 인그레스에서 별도 차단하고
# 스크레이프는 클러스터 내부에서만 하도록 이 정책과 함께 운용한다(values 주석 참조).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kmx-edc-ui.fullname" . }}
  labels:
    {{- include "kmx-edc-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kmx-edc-ui.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 14 }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.monitoringNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
