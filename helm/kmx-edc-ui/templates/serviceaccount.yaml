{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kmx-edc-ui.serviceAccountName" . }}
  labels:
    {{- include "kmx-edc-ui.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# 앱이 K8s API 를 쓰지 않으므로 SA 토큰을 컨테이너에 마운트하지 않는다(이중 방어).
automountServiceAccountToken: false
{{- end }}
