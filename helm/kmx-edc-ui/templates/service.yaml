apiVersion: v1
kind: Service
metadata:
  name: {{ include "kmx-edc-ui.fullname" . }}
  labels:
    {{- include "kmx-edc-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- if and .Values.service.sessionAffinity (ne .Values.service.sessionAffinity "None") }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kmx-edc-ui.selectorLabels" . | nindent 4 }}
