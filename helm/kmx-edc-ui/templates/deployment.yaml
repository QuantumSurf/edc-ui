apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kmx-edc-ui.fullname" . }}
  labels:
    {{- include "kmx-edc-ui.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kmx-edc-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kmx-edc-ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kmx-edc-ui.serviceAccountName" . }}
      # 이 BFF 는 K8s API 를 호출하지 않으므로 SA 토큰 자동 마운트를 끈다(침해 시 클러스터 API
      # 접근·측면이동 차단).
      automountServiceAccountToken: false
      # 비root·권한상승 차단·seccomp — 컨테이너 침해 시 blast radius 최소화.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            - name: VITE_DISABLE_DEMO
              value: {{ .Values.env.VITE_DISABLE_DEMO | quote }}
            - name: TRUST_PROXY
              value: {{ .Values.env.TRUST_PROXY | quote }}
            - name: EDC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: edc-api-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.dbSecretName" . }}
                  key: {{ include "kmx-edc-ui.dbSecretPasswordKey" . }}
            - name: DATABASE_URL
              value: {{ include "kmx-edc-ui.databaseUrl" . | quote }}
            - name: EDC_DEFAULT_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-config
                  key: edc-default-url
            {{- if .Values.oidc.enabled }}
            # ── OIDC(Keycloak) SSO — docs/KEYCLOAK.md ──
            - name: OIDC_ENABLED
              value: "true"
            - name: OIDC_ISSUER_URL
              value: {{ required "oidc.issuerUrl is required when oidc.enabled=true" .Values.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ required "oidc.clientId is required when oidc.enabled=true" .Values.oidc.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: oidc-client-secret
            - name: OIDC_REDIRECT_URL
              value: {{ required "oidc.redirectUrl is required when oidc.enabled=true" .Values.oidc.redirectUrl | quote }}
            - name: OIDC_SCOPES
              value: {{ .Values.oidc.scopes | quote }}
            - name: OIDC_BPN_CLAIM
              value: {{ .Values.oidc.bpnClaim | quote }}
            - name: OIDC_ROLE_CLAIM
              value: {{ .Values.oidc.roleClaim | quote }}
            - name: OIDC_ROLE_ADMIN
              value: {{ .Values.oidc.roleAdmin | quote }}
            - name: OIDC_ROLE_OPERATOR
              value: {{ .Values.oidc.roleOperator | quote }}
            - name: OIDC_ROLE_VIEWER
              value: {{ .Values.oidc.roleViewer | quote }}
            - name: OIDC_AUTO_PROVISION
              value: {{ .Values.oidc.autoProvision | quote }}
            {{- end }}
            # ── 프로덕션 필수 시크릿 (chart-managed Secret) ──
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: jwt-secret
            - name: JWT_EXPIRES_IN
              value: {{ .Values.platform.jwtExpiresIn | quote }}
            - name: HUB_APIKEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: hub-apikey-secret
            - name: PLATFORM_VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: platform-vault-token
            - name: PLATFORM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: platform-database-url
            # ── 플랫폼 엔드포인트 (non-secret) ──
            - name: PLATFORM_VAULT_URL
              value: {{ .Values.platform.vaultUrl | quote }}
            - name: PLATFORM_VAULT_NAMESPACE
              value: {{ .Values.platform.vaultNamespace | quote }}
            - name: DTR_BASE_URL
              value: {{ .Values.platform.dtrBaseUrl | quote }}
            - name: IDENTITY_HUB_URL
              value: {{ .Values.platform.identityHubUrl | quote }}
            - name: IDENTITY_HUB_PARTICIPANT_ID
              value: {{ .Values.platform.identityHubParticipantId | quote }}
            {{- if .Values.platform.identityHubApiKey }}
            - name: IDENTITY_HUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: identity-hub-api-key
            {{- end }}
            # ── 시드 계정 비밀번호(빈 DB 신규 설치 필수, Secret) ──
            {{- if .Values.secrets.seedAdminPassword }}
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: seed-admin-password
            {{- end }}
            {{- if .Values.secrets.seedOperatorPassword }}
            - name: SEED_OPERATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kmx-edc-ui.fullname" . }}-secret
                  key: seed-operator-password
            {{- end }}
            # ── 운영 튜닝 env(값이 있을 때만 주입 — 빈 값은 코드 기본값 유지) ──
            {{- range $k, $v := .Values.env }}
            {{- if and (not (has $k (list "NODE_ENV" "PORT" "VITE_DISABLE_DEMO" "TRUST_PROXY"))) $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            # ── 임의 env 탈출구(DTR_TOKEN 등 — name/value|valueFrom 그대로) ──
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
