# KMX EDC UI — Helm values

replicaCount: 2

image:
  repository: ghcr.io/kmx/kmx-edc-ui
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: edc-ui.kmx.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: kmx-edc-ui-tls
      hosts:
        - edc-ui.kmx.io

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# EDC connector configuration
edc:
  apiKey: "password"
  defaultUrl: "https://kmx-edc-cp.prod.kmx.io/management"

# Application environment variables
env:
  NODE_ENV: production
  PORT: "3001"
  VITE_DISABLE_DEMO: "false"

# External database (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  database: kmx_edc
  username: kmx
  # password via existingSecret or plain value below
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: "password"

# Bitnami PostgreSQL sub-chart
postgresql:
  enabled: true
  auth:
    database: kmx_edc
    username: kmx
    password: "kmx_dev_123"
    # set existingSecret to use a pre-created secret instead
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 8Gi

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3001"

# Liveness / readiness probes
livenessProbe:
  httpGet:
    path: /api/connectors
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/connectors
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
