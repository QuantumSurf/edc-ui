# KMX Platform — Shared Infrastructure (Vault + PostgreSQL)
#
# 모든 EDC 커넥터(provider/consumer 등)가 공유하는 인프라.
# 소유: kmx-edc-ui (관리 콘솔이 platform infrastructure도 호스팅).
#
# 실행 순서 (전제):
#   1. kmx-identityhub 먼저 실행 — 외부 네트워크 kmx-ih_default 생성
#   2. 본 platform compose 실행
#   3. kmx-edc-ui (BFF) 실행
#   4. kmx-edc 커넥터 stack 실행 (provider/consumer)
#
# 자세한 설계 결정:
#   - vault: ../kmx-edc/docs/architecture/vault-deployment.md
#   - postgres: ../kmx-edc/docs/architecture/postgres-deployment.md
#
# Note: Vault는 dev mode (root token). 운영 환경에서는 production mode + auto-unseal
#       (KMS) + AppRole로 교체 — SECURITY.md 참조.

name: kmx-platform

services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL — 공유 HA-ready 인스턴스
  # 두 개의 EDC 커넥터 DB(kmxedc, kmxedc_consumer)를 호스팅.
  # ──────────────────────────────────────────────────────────
  platform-postgres:
    image: postgres:15.6-alpine
    container_name: kmx-platform-postgres
    environment:
      POSTGRES_DB: kmxedc
      POSTGRES_USER: kmxedc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kmxedc-dev-password}
      POSTGRES_MULTIPLE_DATABASES: "kmxedc,kmxedc_consumer,dtr"
    ports:
      - "5432:5432"
    volumes:
      - platformpgdata:/var/lib/postgresql/data
      - ../kmx-edc/resources/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmxedc -d kmxedc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - kmx-ih_default

  # Flyway — Provider DB (kmxedc)
  platform-flyway-provider:
    image: flyway/flyway:10.10.0
    container_name: kmx-platform-flyway-provider
    depends_on:
      platform-postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://platform-postgres:5432/kmxedc
      -user=kmxedc
      -password=${POSTGRES_PASSWORD:-kmxedc-dev-password}
      -locations=filesystem:/flyway/sql
      -validateMigrationNaming=true
      migrate
    volumes:
      - ../kmx-edc/resources/db/migration:/flyway/sql:ro
    networks:
      - kmx-ih_default

  # Flyway — Consumer DB (kmxedc_consumer)
  platform-flyway-consumer:
    image: flyway/flyway:10.10.0
    container_name: kmx-platform-flyway-consumer
    depends_on:
      platform-postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://platform-postgres:5432/kmxedc_consumer
      -user=kmxedc
      -password=${POSTGRES_PASSWORD:-kmxedc-dev-password}
      -locations=filesystem:/flyway/sql
      -validateMigrationNaming=true
      migrate
    volumes:
      - ../kmx-edc/resources/db/migration:/flyway/sql:ro
    networks:
      - kmx-ih_default

  # ──────────────────────────────────────────────────────────
  # HashiCorp Vault — 공유 시크릿 저장소
  # 운영에서는 namespace로 커넥터별 격리 (Enterprise) 또는
  # secret path prefix로 격리 (OSS).
  # ──────────────────────────────────────────────────────────
  platform-vault:
    image: hashicorp/vault:1.17.6
    container_name: kmx-platform-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - kmx-ih_default

  platform-vault-setup:
    image: hashicorp/vault:1.17.6
    container_name: kmx-platform-vault-setup
    depends_on:
      platform-vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://platform-vault:8200"
      VAULT_TOKEN: root
    entrypoint: /bin/sh
    command:
      - -c
      - |
        vault secrets enable -path=secret kv-v2 2>/dev/null || true
        vault kv put secret/ih-aes-key content=xUIyz5ULSUMR/++dPtL10mneHwwS3mlmL/eZ8SJ/2ws=
        vault kv put secret/dataplane-private-key content="-----BEGIN PRIVATE KEY-----
        MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgjrO6Yz5FKHKwGeQT
        wbUGYpePtwdW818H7tDzMO2+ZYyhRANCAAQWa8pxMRlftcbvB/aqfO67rLM2vUIp
        l2q0D1JMHRkuBglgBtncV7JfHmgiNOM1rYwxEhUawDrvn6vItihv1p0G
        -----END PRIVATE KEY-----"
        vault kv put secret/dataplane-public-key content="-----BEGIN PUBLIC KEY-----
        MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEFmvKcTEZX7XG7wf2qnzuu6yzNr1C
        KZdqtA9STB0ZLgYJYAbZ3FeyXx5oIjTjNa2MMRIVGsA675+ryLYob9adBg==
        -----END PUBLIC KEY-----"
        echo "Platform Vault initialized (provider + consumer 공용)"
    networks:
      - kmx-ih_default

  # ──────────────────────────────────────────────────────────
  # STS Secret Bridge — IH 부트스트랩이 발급하는 client_secret 자동 주입
  # Provider + Consumer 두 BPN 모두 처리 (단일 Vault에 두 alias로 저장).
  # ⚠ DEV ONLY — 프로덕션 금지:
  #   - docker.sock 마운트(ro)로 호스트 docker 데몬에 접근(권한 상승 표면) + 상시 실행.
  #   - Vault 접근에 root 토큰(VAULT_TOKEN=root) 사용.
  #   - 시크릿을 `docker logs` 평문(KMX_IH_BOOTSTRAP_LOG_SECRETS)에서 추출.
  #   운영에서는 Vault Agent/Init Container로 시크릿을 직접 주입하고 이 서비스를 제거할 것.
  # ──────────────────────────────────────────────────────────
  platform-sts-bridge:
    image: docker:24-cli
    container_name: kmx-platform-sts-bridge
    depends_on:
      platform-vault-setup:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # 자가복구(self-healing) 사이드카: Vault/IH 재시작으로 시크릿이 사라져도
    # 누락을 감지해 자동 재주입한다(멱등). 일회성이 아니라 상시 실행.
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        VADDR=http://127.0.0.1:8200
        VTOKEN=root

        # IH 부트스트랩 완료 대기 (최초 1회)
        for i in $$(seq 1 60); do
          if docker logs kmx-ih-identityhub 2>&1 | grep -q "Bootstrap complete"; then
            break
          fi
          sleep 2
        done

        # STS client_secret 동기화: IH-vault {BPN}-sts-client-secret →
        # platform-vault {ALIAS}. client_secret은 재부트스트랩(down -v)마다 회전하므로
        # 매 루프 덮어쓴다(누락 시에만 주입하면 회전 후 stale → CatalogError 401).
        # IH 로그 추출 대신 IH-vault 권위 소스를 사용해 로그 로테이션에도 안전.
        sync_sts_secret() {
          ALIAS=$$1; BPN=$$2
          S=$$(docker exec -e VAULT_ADDR=$$VADDR -e VAULT_TOKEN=$$VTOKEN kmx-ih-vault \
                vault kv get -field=content secret/$$BPN-sts-client-secret 2>/dev/null)
          if [ -n "$$S" ]; then
            docker exec -e VAULT_ADDR=$$VADDR -e VAULT_TOKEN=$$VTOKEN kmx-platform-vault \
              vault kv put secret/$$ALIAS content="$$S" >/dev/null \
              && echo "STS secret synced (alias=$$ALIAS)"
          fi
        }

        # IdentityHub participant API 키 동기화: IH-vault {BPN}-apikey →
        # platform-vault ih-apikey-{BPN}. 키는 재부트스트랩마다 회전하므로 매 루프 덮어쓴다.
        sync_apikey() {
          BPN=$$1
          AK=$$(docker exec -e VAULT_ADDR=$$VADDR -e VAULT_TOKEN=$$VTOKEN kmx-ih-vault \
                vault kv get -field=content secret/$$BPN-apikey 2>/dev/null)
          if [ -n "$$AK" ]; then
            docker exec -e VAULT_ADDR=$$VADDR -e VAULT_TOKEN=$$VTOKEN kmx-platform-vault \
              vault kv put secret/ih-apikey-$$BPN content="$$AK" >/dev/null \
              && echo "IH apikey synced (alias=ih-apikey-$$BPN)"
          fi
        }

        # 30초마다 누락 점검 후 재주입 (Vault/IH 재시작에도 자동 복구)
        while true; do
          sync_sts_secret sts-client-secret BPNL000000000PRD
          sync_sts_secret consumer-sts-client-secret BPNL000000000CON
          sync_apikey BPNL000000000PRD
          sync_apikey BPNL000000000CON
          sleep 30
        done
    networks:
      - kmx-ih_default

  # ──────────────────────────────────────────────────────────
  # Tractus-X Digital Twin Registry (sldt-digital-twin-registry)
  # 인증 비활성(dev), platform-postgres 의 'dtr' DB 사용.
  # 컨테이너 내부 호출: http://platform-dtr:4243/semantics/registry/api/v3/...
  # ──────────────────────────────────────────────────────────
  platform-dtr:
    image: tractusx/sldt-digital-twin-registry:0.11.0
    container_name: kmx-platform-dtr
    depends_on:
      platform-postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://platform-postgres:5432/dtr
      SPRING_DATASOURCE_USERNAME: kmxedc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-kmxedc-dev-password}
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      # Activate DTR's built-in `local` profile which wires LocalOauthSecurityConfig
      # (permits all requests). No external IDP needed for dev.
      SPRING_PROFILES_ACTIVE: local
      REGISTRY_IDM_OWNINGTENANTID: default-tenant
      REGISTRY_IDM_PUBLICCLIENTID: default-client
      REGISTRY_USE_GRANULAR_ACCESS_CONTROL: "false"
      SERVER_PORT: "4243"
      SERVER_SERVLET_CONTEXT_PATH: /semantics/registry
    ports:
      - "4243:4243"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4243/semantics/registry/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - kmx-ih_default

volumes:
  platformpgdata:

networks:
  # kmx-identityhub가 생성하는 외부 네트워크
  kmx-ih_default:
    external: true
