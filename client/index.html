<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Quantum-X | 커넥터 허브</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- 폰트: 맑은 고딕(시스템 서체) 단일 사용 — 웹폰트 로드 없음 -->
  </head>

  <body>
    <!-- 부트 폴백: 엔트리 번들 로드 실패/지연(구 index.html 이 사라진 청크를 가리키는
         경우 등) 시 흰 화면 대신 안내한다. React 마운트 시 createRoot 가 이 내용을
         교체하므로 정상 부팅에는 보이지 않는다. Tailwind/CSS 로드 전이라 인라인 스타일 사용. -->
    <div id="root">
      <div
        id="boot-fallback"
        style="
          font-family: &quot;Malgun Gothic&quot;, system-ui, sans-serif;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 12px;
          color: #334155;
          background: #ffffff;
        "
      >
        <div
          style="
            width: 32px;
            height: 32px;
            border: 3px solid #cbd5e1;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: boot-spin 0.8s linear infinite;
          "
        ></div>
        <p style="margin: 0; font-size: 14px">앱을 불러오는 중…</p>
        <!-- 8초간 마운트가 없으면(엔트리 번들 로드 실패 등) 안내를 드러낸다.
             인라인 <script> 는 prod CSP(script-src 'self')에 막히므로, CSS 지연
             애니메이션으로 구현한다(style-src 'unsafe-inline' 허용). React 가
             마운트하면 #boot-fallback 이 통째로 교체돼 이 문구는 나타나지 않는다. -->
        <p
          style="
            margin: 0;
            font-size: 13px;
            opacity: 0;
            animation: boot-reveal 0s linear 8s forwards;
          "
        >
          로딩이 지연됩니다. 새로고침(Ctrl+Shift+R) 해 주세요.
        </p>
      </div>
    </div>
    <style>
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes boot-reveal {
        to {
          opacity: 1;
        }
      }
    </style>
    <noscript>
      <div
        style="
          font-family: &quot;Malgun Gothic&quot;, system-ui, sans-serif;
          padding: 24px;
          text-align: center;
          color: #334155;
        "
      >
        이 애플리케이션을 사용하려면 JavaScript 가 필요합니다. 브라우저에서
        JavaScript 를 활성화한 뒤 다시 시도해 주세요.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
