    post:
      tags: [dtr]
      summary: Shell 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "201": { $ref: "#/components/responses/EdcObject" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/dtr/shells/{aasId}:
    parameters:
      - $ref: "#/components/parameters/AasId"
    get:
      tags: [dtr]
      summary: Shell 단건 조회
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [dtr]
      summary: Shell 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [dtr]
      summary: Shell 삭제
      responses:
        "204": { description: 삭제됨 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/dtr/shells/{aasId}/raw:
    parameters:
      - $ref: "#/components/parameters/AasId"
    get:
      tags: [dtr]
      summary: Shell 원본(raw) 조회
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/dtr/lookup:
    post:
      tags: [dtr]
      summary: specific asset id 기반 Shell 룩업
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "200": { $ref: "#/components/responses/EdcObjectArray" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/CsrfForbidden" }

  # ── dtr (submodels) ──────────────────────────────────────────────────────────
  /api/dtr/shells/{aasId}/submodels:
    parameters:
      - $ref: "#/components/parameters/AasId"
    get:
      tags: [dtr]
      summary: Shell 의 Submodel Descriptor 목록
      responses:
        "200":
          description: "{ items: SubmodelDescriptor[] } 봉투"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { type: object } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [dtr]
      summary: Submodel Descriptor 추가
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "201": { $ref: "#/components/responses/EdcObject" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/dtr/shells/{aasId}/submodels/{submodelId}:
    parameters:
      - $ref: "#/components/parameters/AasId"
      - name: submodelId
        in: path
        required: true
        schema: { type: string }
    put:
      tags: [dtr]
      summary: Submodel Descriptor 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [dtr]
      summary: Submodel Descriptor 삭제
      responses:
        "204": { description: 삭제됨 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/dtr/shells/{aasId}/submodels/{submodelId}/content:
    parameters:
      - $ref: "#/components/parameters/AasId"
      - name: submodelId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [dtr]
      summary: 서브모델 실본문(AAS Part 2) 조회 — endpoint href 를 SSRF 가드 하에 프록시
      responses:
        "200":
          description: idShort·semanticId·href·content(AAS Submodel)
          content:
            application/json:
              schema:
                type: object
                properties:
                  idShort: { type: string }
                  semanticId: { type: string }
                  href: { type: string }
                  content: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── semantics ────────────────────────────────────────────────────────────────
  /api/semantics/models:
    get:
      tags: [semantics]
      summary: Aspect Model 목록
      responses:
        "200": { $ref: "#/components/responses/EdcObjectArray" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [semantics]
      summary: Aspect Model 등록(최대 1MB)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "201": { $ref: "#/components/responses/EdcObject" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/semantics/models/{urn}:
    parameters:
      - name: urn
        in: path
        required: true
        description: Aspect Model URN(예 urn:samm:...)
        schema: { type: string }
    get:
      tags: [semantics]
      summary: Aspect Model 단건 조회
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [semantics]
      summary: Aspect Model 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [semantics]
      summary: Aspect Model 삭제
      responses:
        "204": { description: 삭제됨 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── audit ──────────────────────────────────────────────────────────────────
  /api/audit:
    get:
      tags: [audit]
      summary: 감사 로그 조회(테넌트 스코프)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 500, maximum: 2000 }
        - name: days
          in: query
          description: 서버측 기간 필터(1~90). 미지정 시 전체 기간.
          schema: { type: integer, minimum: 1, maximum: 90 }
      responses:
        "200": { $ref: "#/components/responses/EdcObjectArray" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ── field-history ────────────────────────────────────────────────────────────
  /api/field-history:
    get:
      tags: [field-history]
      summary: 필드 변경 이력 조회
      responses:
        "200": { $ref: "#/components/responses/EdcObjectArray" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [field-history]
      summary: 필드 변경 이력 기록
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "201": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/CsrfForbidden" }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: kmx_token
      description: |
        httpOnly JWT 세션 쿠키. 로그인 시 발급된다. 상태 변경 요청은 추가로
        `X-CSRF-Token` 헤더에 `kmx_csrf` 쿠키 값을 실어야 한다(double-submit).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 프로그램 클라이언트용 Authorization 헤더 폴백(쿠키 대체).

  parameters:
    ConnectorId:
      name: id
      in: path
      required: true
      description: 커넥터 ID(테넌트 소유권 검사 대상)
      schema: { type: string }
    AssetId:
      name: assetId
      in: path
      required: true
      schema: { type: string }
    NegId:
      name: negId
      in: path
      required: true
      schema: { type: string }
    TransferId:
      name: tpId
      in: path
      required: true
      description: 전송 프로세스 ID
      schema: { type: string }
    AasId:
      name: aasId
      in: path
      required: true
      description: AAS Shell 식별자(대개 base64url 인코딩)
      schema: { type: string }
    GenericId:
      name: id
      in: path
      required: true
      schema: { type: string }

  schemas:
    ValidationError:
      type: object
      required: [error, issues]
      description: zod 입력 검증 실패 봉투(로그인·비밀번호변경·커넥터 등록/수정/연결테스트).
      properties:
        error: { type: string, const: validation }
        issues:
          type: array
          items:
            type: object
            properties:
              path: { type: string, description: "필드 경로(예: tenantId)" }
              message: { type: string }
    CatalogOffer:
      type: object
      description: BFF 가공 카탈로그 오퍼(EDC pass-through 아님). AAS 필드는 DTR 매칭 시에만.
      properties:
        name: { type: string }
        type: { type: string }
        src: { type: string }
        pols: { type: array, items: { type: string } }
        offerId: { type: string }
        offerPolicy: { type: ["object", "null"] }
        assetId: { type: string }
        dspEndpoint: { type: string }
        providerDid: { type: string }
        aasId: { type: ["string", "null"] }
        aasIdShort: { type: ["string", "null"] }
        globalAssetId: { type: ["string", "null"] }
    SuccessRate:
      type: object
      properties:
        total: { type: integer }
        finalized: { type: integer, description: "협상 전용" }
        terminated: { type: integer }
        completed: { type: integer, description: "전송 전용" }
        failed: { type: integer }
        successRate:
          {
            type: ["number", "null"],
            description: "퍼센트(관측 터미널 0 이면 null)",
          }
    NotifyPrefs:
      type: object
      description: 알림 source 토글(true=on). 미지 키는 PUT 에서 거부(strict).
      properties:
        "notify.vcExpiry": { type: boolean }
        "notify.negTerminated": { type: boolean }
        "notify.transferFailed": { type: boolean }
        "notify.edrExpiry": { type: boolean }
        "notify.connectorHealth": { type: boolean }
      additionalProperties: false
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: 사람이 읽을 오류 메시지(민감정보는 서버에서 일반화됨)
        source:
          type: string
          enum: [edc, dtr]
          description: 프록시 상류 오류의 출처(있을 때만)
        actionable:
          type: boolean
          description: 4xx 상류 오류에서 상세를 그대로 노출해도 되는지(admin/operator 대상)

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [admin, operator, viewer] }
        tenantId: { type: string }
        tenantName: { type: string }
        tenantBpn: { type: string, description: Business Partner Number }

    Connector:
      type: object
      description: 등록된 커넥터. status 는 헬스체크로 파생되어 목록에 병합된다.
      properties:
        id: { type: string }
        name: { type: string }
        managementUrl: { type: string, format: uri }
        protocolUrl: { type: string, format: uri }
        bpn: { type: string }
        status:
          type: string
          enum: [up, warn, down]
          description: 4개 프로브(관리 API·health·DSP·DB) 중 ok 수로 판정
        tenantId: { type: string }
      additionalProperties: true

    ConnectorInput:
      type: object
      required: [name, managementUrl]
      properties:
        name: { type: string }
        managementUrl: { type: string, format: uri }
        protocolUrl: { type: string, format: uri }
        apiKey:
          type: string
          description: 관리 API 키. 저장 시 AES-256-GCM 으로 암호화된다(응답에는 미포함).
        bpn: { type: string }
      additionalProperties: true

    Notification:
      type: object
      description: 콘솔 알림(폴러 생성). source 는 알림 토글(NotifyPrefs)과 대응한다.
      properties:
        id: { type: string }
        type: { type: string, enum: [info, warning, error, success] }
        source:
          type: string
          enum: [system, negotiation, transfer, edr, vc]
        title: { type: string }
        message: { type: string }
        link: { type: ["string", "null"] }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }
      additionalProperties: true

    QuerySpec:
      type: object
      description: |
        EDC Management API QuerySpec. 목록 필터·정렬·범위를 기술한다. 생략 시 서버
        기본값(대개 limit=50 이상)이 적용된다. 필드는 EDC 계약을 그대로 따른다.
      properties:
        offset: { type: integer }
        limit: { type: integer }
        sortField: { type: string }
        sortOrder: { type: string, enum: [ASC, DESC] }
        filterExpression:
          type: array
          items: { type: object, additionalProperties: true }
      additionalProperties: true

    EdcObject:
      type: object
      description: |
        EDC/DTR 상류가 반환하는 JSON-LD 오브젝트를 그대로 전달한 것. 스키마를 고정하지
        않는다(@context/@id/@type 등 JSON-LD 키 포함 가능). 정확한 형태는 EDC 0.16.0
        Management API 계약을 참조.
      additionalProperties: true

  responses:
    EdcObject:
      description: EDC/DTR 상류 오브젝트(pass-through)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/EdcObject" }
    EdcObjectArray:
      description: EDC/DTR 상류 오브젝트 배열(pass-through, 클라이언트 페이지네이션)
      content:
        application/json:
          schema:
            type: array
            items: { $ref: "#/components/schemas/EdcObject" }
    ValidationFailed:
      description: zod 입력 검증 실패
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationError" }
    ConnectorInputError:
      description: 입력 검증(zod) 실패 또는 SSRF 거부(사설/메타데이터 URL)
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ValidationError"
              - $ref: "#/components/schemas/Error"
    BadRequest:
      description: 잘못된 요청(검증 실패)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: 미인증(토큰 없음/무효/만료/무효화) 또는 세션 만료
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: 인증됐으나 권한 부족(RBAC) 또는 CSRF 실패
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    CsrfForbidden:
      description: CSRF 토큰 불일치 또는 권한 부족
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: 리소스 없음 또는 교차테넌트 접근(소유권 검사 실패)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
