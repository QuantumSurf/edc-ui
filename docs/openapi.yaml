openapi: 3.1.0

# ─────────────────────────────────────────────────────────────────────────────
# KMX EDC Console — BFF API 계약 (OpenAPI 3.1)
#
# 이 문서는 React 콘솔이 소비하는 내부 BFF(Backend-for-Frontend)의 계약을 기술한다.
# BFF 는 EDC(0.16.0)/DTR/IdentityHub/Vault 를 프록시하며, 다수 응답 바디는 상류
# 서비스의 JSON 을 그대로 전달(pass-through)한다. 그런 바디는 필드를 날조하지 않고
# 일반 object 로 모델링하고 설명으로 출처를 명시한다(정직성 우선).
#
# 소스 오브 트루스: server/app.ts 의 라우터 마운트 + server/routes/*.ts.
# 스펙과 코드가 어긋나면 코드가 정답이다 — 이 파일을 코드에 맞춰 갱신한다.
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: KMX EDC Console BFF API
  version: "1.0.0"
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: |
    데이터스페이스 커넥터(EDC) 운영 콘솔의 BFF API.

    ## 인증 (Cookie 세션)
    - 로그인 성공 시 서버가 두 쿠키를 발급한다:
      - `kmx_token` — httpOnly JWT 세션(클라 JS 접근 불가), `SameSite=Strict`, prod 에서 `Secure`.
      - `kmx_csrf` — JS 가독 CSRF 이중제출 토큰.
    - 이후 모든 요청은 쿠키가 자동 첨부된다. 프로그램 클라이언트는
      `Authorization: Bearer <jwt>` 폴백도 사용할 수 있다.

    ## CSRF (double-submit)
    - 상태 변경 메서드(POST/PUT/PATCH/DELETE)는 `X-CSRF-Token` 헤더에 `kmx_csrf`
      쿠키 값을 되돌려 실어야 한다. 불일치 시 403.
    - 예외: `POST /api/auth/login` (자격증명으로 정당성이 검증되고 부작용이 세션 발급뿐).

    ## RBAC
    - 역할: `admin` > `operator` > `viewer`. 쓰기(생성/수정/삭제)는 operator 이상,
      플랫폼/설정은 admin. 권한 부족 시 403 `forbidden`.

    ## 에러 봉투
    - 모든 오류 응답은 `{ "error": string }` 를 기본으로 하며, EDC/DTR 프록시 오류는
      `source`("edc"|"dtr")와, 4xx 인 경우 `actionable: true` 를 덧붙일 수 있다.

    ## 멀티테넌시
    - 세션 JWT 의 `tenantId` 로 모든 리소스가 스코프된다. 커넥터 하위 경로는
      소유권 검사(requireConnectorOwnership)를 통과해야 한다(교차테넌트 접근 시 404).

    ## 페이지네이션
    - 목록 엔드포인트는 전체 배열을 반환하고 페이지네이션은 클라이언트에서 수행한다
      (usePagination + DataTablePagination). 서버측 page/limit 쿼리는 사용하지 않는다.

servers:
  - url: /
    description: 동일 오리진(콘솔이 BFF 와 같은 호스트에서 서빙됨)

tags:
  - name: infra
    description: 인프라 프로브·메트릭 (무인증, /api 밖)
  - name: auth
    description: 인증·세션
  - name: connectors
    description: 커넥터 CRUD
  - name: assets
    description: 데이터 자산 (커넥터 스코프)
  - name: policies
    description: 정책 정의 (커넥터 스코프)
  - name: offerings
    description: 컨트랙트 데피니션/오퍼링 (커넥터 스코프)
  - name: catalog
    description: 원격 카탈로그 조회
  - name: negotiations
    description: 컨트랙트 협상
  - name: transfers
    description: 데이터 전송 프로세스
  - name: edrs
    description: EDR(Endpoint Data Reference) 캐시
  - name: stats
    description: 커넥터 통계·트렌드
  - name: notifications
    description: 콘솔 알림
  - name: fleet
    description: 플릿(멀티커넥터) KPI
  - name: platform
    description: 플랫폼 인프라(Vault/Postgres) 관측
  - name: system
    description: 시스템 정보·설정
  - name: identity-hub
    description: IdentityHub 상태·참여자
  - name: dtr
    description: Digital Twin Registry (Shells/Submodels)
  - name: semantics
    description: 시맨틱 모델(Aspect Models)
  - name: audit
    description: 감사 로그 조회
  - name: field-history
    description: 필드 변경 이력

# 기본 인증: 쿠키 세션(정규) 또는 Bearer JWT(프로그램 클라 폴백) — 둘 중 하나면 통과.
security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  # ── infra ──────────────────────────────────────────────────────────────────
  /healthz:
    get:
      tags: [infra]
      summary: Liveness 프로브
      security: []
      responses:
        "200":
          description: 살아있음
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: ok }

  /readyz:
    get:
      tags: [infra]
      summary: Readiness 프로브 (DB 연결 + 스키마 버전 게이팅)
      security: []
      responses:
        "200":
          description: 준비됨
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: ready }
        "503":
          description: 미준비(마이그레이션 중이거나 DB 미가용)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [migrating, not-ready] }

  /metrics:
    get:
      tags: [infra]
      summary: Prometheus 메트릭 (텍스트 노출)
      description: k8s Prometheus 스크레이프용. tenant 라벨 없음(카디널리티·정보노출 방지).
      security: []
      responses:
        "200":
          description: Prometheus exposition 형식
          content:
            text/plain:
              schema: { type: string }

  # ── auth ───────────────────────────────────────────────────────────────────
  /api/auth/login:
    post:
      tags: [auth]
      summary: 로그인 (세션 쿠키 발급)
      description: 성공 시 `kmx_token`(httpOnly)·`kmx_csrf` 쿠키를 Set-Cookie 로 발급한다. CSRF 예외.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, password]
              properties:
                tenantId:
                  type: string
                  description: >-
                    테넌트 식별자(BPN). 이메일이 아니다 — 시드 계정은 역할별로
                    별도 테넌트에 1:1 매핑되며 BPN 으로 로그인한다.
                password: { type: string, format: password }
      responses:
        "200":
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: kmx_token(httpOnly) 및 kmx_csrf 쿠키
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/ValidationFailed" }
        "401":
          description: 자격증명 불일치
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, const: invalid-credentials }
        "429":
          description: 반복 실패로 계정 잠금
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, const: account-locked }

  /api/auth/logout:
    post:
      tags: [auth]
      summary: 로그아웃 (전체 세션 강제 종료)
      description: 호출자의 token_version 을 증가시켜 발급된 모든 토큰을 즉시 무효화한다(탈취 토큰 회수).
      responses:
        "204": { description: 로그아웃 완료(쿠키 삭제) }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/CsrfForbidden" }

  /api/auth/me:
    get:
      tags: [auth]
      summary: 현재 세션 사용자
      responses:
        "200":
          description: 세션 사용자 정보
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/change-password:
    post:
      tags: [auth]
      summary: 비밀번호 변경
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, format: password }
                newPassword: { type: string, format: password }
      responses:
        "204": { description: 변경 완료 }
        "400": { $ref: "#/components/responses/ValidationFailed" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/CsrfForbidden" }

  # ── connectors ───────────────────────────────────────────────────────────────
  /api/connectors:
    get:
      tags: [connectors]
      summary: 커넥터 목록 (테넌트 스코프, 상태 포함)
      responses:
        "200":
          description: 커넥터 배열
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Connector" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [connectors]
      summary: 커넥터 등록
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConnectorInput" }
      responses:
        "201":
          description: 생성됨
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connector" }
        "400": { $ref: "#/components/responses/ConnectorInputError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/connectors/test-connection:
    post:
      tags: [connectors]
      summary: 커넥터 연결 테스트(저장 전 검증)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConnectorInput" }
      responses:
        "400": { $ref: "#/components/responses/ConnectorInputError" }
        "200":
          description: 연결 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  detail: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/CsrfForbidden" }

  # ── OIDC(Keycloak) SSO ───────────────────────────────────────────────────────
  /api/auth/oidc/status:
    get:
      tags: [auth]
      summary: OIDC 활성 여부(무인증) — 로그인 화면 SSO 버튼 노출 판단
      security: []
      responses:
        "200":
          description: 활성 여부
          content:
            application/json:
              schema:
                type: object
                properties: { enabled: { type: boolean } }
  /api/auth/oidc/login:
    get:
      tags: [auth]
      summary: Keycloak authorize 로 302(PKCE+state+nonce 쿠키 발급)
      security: []
      responses:
        "302": { description: IdP authorize 엔드포인트로 리다이렉트 }
        "503": { description: OIDC 비활성 }
  /api/auth/oidc/callback:
    get:
      tags: [auth]
      summary: IdP 콜백 — code 교환·ID 토큰 검증 후 세션 발급, "/" 로 302
      description: 실패는 `/?sso_error=<code>` 로 302(코드는 docs/KEYCLOAK.md 참조).
      security: []
      parameters:
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
      responses:
        "302":
          description: 성공 시 "/", 실패 시 "/?sso_error=..."
        "503": { description: OIDC 비활성 }

  /api/connectors/{id}:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    put:
      tags: [connectors]
      summary: 커넥터 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConnectorInput" }
      responses:
        "200":
          description: 수정됨
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connector" }
        "400": { $ref: "#/components/responses/ConnectorInputError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [connectors]
      summary: 커넥터 삭제
      responses:
        "204": { description: 삭제됨 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/connectors/{id}/health:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    get:
      tags: [connectors]
      summary: 커넥터 헬스 체크(management API 도달성)
      responses:
        "200":
          description: 헬스 상태
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── assets ─────────────────────────────────────────────────────────────────
  /api/connectors/{id}/assets:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    post:
      tags: [assets]
      summary: 자산 목록 조회(EDC QuerySpec)
      description: 부작용 없는 목록 조회지만 QuerySpec 바디를 받기 위해 POST 를 사용한다(EDC 관례).
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuerySpec" }
      responses:
        "200": { $ref: "#/components/responses/EdcObjectArray" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/CsrfForbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/connectors/{id}/assets/create:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    post:
      tags: [assets]
      summary: 자산 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "201": { $ref: "#/components/responses/EdcObject" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/connectors/{id}/assets/{assetId}:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
      - $ref: "#/components/parameters/AssetId"
    get:
      tags: [assets]
      summary: 자산 단건 조회
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [assets]
      summary: 자산 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [assets]
      summary: 자산 삭제
      responses:
        "204": { description: 삭제됨 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── policies ─────────────────────────────────────────────────────────────────
  /api/connectors/{id}/policies:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    post:
      tags: [policies]
      summary: 정책 목록 조회(QuerySpec)
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuerySpec" }
      responses:
        "200": { $ref: "#/components/responses/EdcObjectArray" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/connectors/{id}/policies/create:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    post:
      tags: [policies]
      summary: 정책 정의 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "201": { $ref: "#/components/responses/EdcObject" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/connectors/{id}/policies/{policyId}:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
      - name: policyId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [policies]
      summary: 정책 단건 조회
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [policies]
      summary: 정책 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "200": { $ref: "#/components/responses/EdcObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [policies]
      summary: 정책 삭제
      responses:
        "204": { description: 삭제됨 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── offerings (contract definitions) ─────────────────────────────────────────
  /api/connectors/{id}/offerings:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    post:
      tags: [offerings]
      summary: 오퍼링(컨트랙트 데피니션) 목록 조회(QuerySpec)
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuerySpec" }
      responses:
        "200": { $ref: "#/components/responses/EdcObjectArray" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/connectors/{id}/offerings/create:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
    post:
      tags: [offerings]
      summary: 오퍼링 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EdcObject" }
      responses:
        "201": { $ref: "#/components/responses/EdcObject" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/connectors/{id}/offerings/{offId}:
    parameters:
      - $ref: "#/components/parameters/ConnectorId"
      - name: offId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [offerings]
