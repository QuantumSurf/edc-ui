# KMX EDC UI — Docker Compose
# Usage:
#   docker compose up --build        # Build and run
#   docker compose up -d             # Detached mode
#   docker compose logs -f kmx-ui    # View logs
#   docker compose down              # Stop
#
# EDC 커넥터 온보딩 정보 (kmx-ui에서 커넥터 등록 시 사용):
#   Provider  Management API : http://kmx-provider-controlplane:8081/management
#             DSP Endpoint   : http://kmx-provider-controlplane:8283/api/v1/dsp
#   Consumer  Management API : http://kmx-consumer-controlplane:8081/management
#             DSP Endpoint   : http://kmx-consumer-controlplane:8283/api/v1/dsp
#   API Key (공통)           : password

services:
  postgres:
    image: postgres:16-alpine
    container_name: kmx-edc-ui-postgres
    environment:
      POSTGRES_DB: kmx_edc
      POSTGRES_USER: kmx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmx -d kmx_edc"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  kmx-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kmx-edc-ui
    ports:
      - "3003:3001"
    environment:
      - NODE_ENV=production
      # 이 파일은 실 배포(production) 아티팩트다. 프로덕션 시크릿은 .env 에서 반드시 주입해야
      # 하며, 미설정 시 compose 가 즉시 실패한다(fail-closed). dev/데모는 docker-compose.dev.yml 사용.
      # (과거 ALLOW_INSECURE_DEFAULTS=true + root/dev 기본값이 여기 있어 server/lib/platform.ts
      #  가드를 무력화했었음 — 제거함.)
      - PORT=3001
      - DATABASE_URL=postgresql://kmx:${POSTGRES_PASSWORD}@postgres:5432/kmx_edc
      - EDC_API_KEY=${EDC_API_KEY:-}
      - EDC_DEFAULT_URL=${EDC_DEFAULT_URL:-}
      - VITE_DISABLE_DEMO=${VITE_DISABLE_DEMO:-false}
      # JWT 서명키 — 강한 32자+ 시크릿(공개 약한값 금지, server/lib/auth.ts 가드). 필수.
      - JWT_SECRET=${JWT_SECRET:?set a strong JWT_SECRET in .env}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-12h}
      # 커넥터 EDC API Key at-rest 암호화 키(AES-256-GCM) — prod 필수(server/lib/crypto.ts).
      - HUB_APIKEY_SECRET=${HUB_APIKEY_SECRET:?set HUB_APIKEY_SECRET in .env}
      # Platform infrastructure (kmx-platform compose project)
      - PLATFORM_VAULT_URL=${PLATFORM_VAULT_URL:-http://platform-vault:8200}
      - PLATFORM_VAULT_TOKEN=${PLATFORM_VAULT_TOKEN:?set PLATFORM_VAULT_TOKEN in .env}
      - PLATFORM_VAULT_NAMESPACE=${PLATFORM_VAULT_NAMESPACE:-}
      - PLATFORM_DATABASE_URL=${PLATFORM_DATABASE_URL:?set PLATFORM_DATABASE_URL in .env}
      # Digital Twin Registry (kmx-platform compose project)
      - DTR_BASE_URL=${DTR_BASE_URL:-http://platform-dtr:4243/semantics/registry}
      # IdentityHub (kmx-platform compose project) — baseline; UI can override
      - IDENTITY_HUB_URL=${IDENTITY_HUB_URL:-}
      - IDENTITY_HUB_PARTICIPANT_ID=${IDENTITY_HUB_PARTICIPANT_ID:-}
      - IDENTITY_HUB_API_KEY=${IDENTITY_HUB_API_KEY:-}
      # 시드 계정 비밀번호 — 빈 DB 로 시작하는 신규 설치 필수. server/lib/db.ts 가 prod 에서
      # 미설정/약한 값이면 부팅 실패하므로 .env 에서 강한 값을 반드시 주입한다(fail-closed).
      # 기존 DB(사용자 존재) 업그레이드면 무시된다.
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:?set a strong SEED_ADMIN_PASSWORD (>=8) in .env}
      - SEED_OPERATOR_PASSWORD=${SEED_OPERATOR_PASSWORD:?set a strong SEED_OPERATOR_PASSWORD (>=8) in .env}
      # 운영 튜닝(선택 — 코드 기본값 존재). .env 에서 override 가능.
      - EDC_POLICY_PROFILE=${EDC_POLICY_PROFILE:-}
      - API_RATE_LIMIT_MAX=${API_RATE_LIMIT_MAX:-300}
      - API_RATE_LIMIT_WINDOW_MS=${API_RATE_LIMIT_WINDOW_MS:-60000}
      - DB_STATEMENT_TIMEOUT_MS=${DB_STATEMENT_TIMEOUT_MS:-}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-90}
      - TRUST_PROXY=${TRUST_PROXY:-1}
      # OIDC(Keycloak) SSO — 선택. docs/KEYCLOAK.md. OIDC_ENABLED=true 시 나머지 필수.
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URL=${OIDC_REDIRECT_URL:-}
    networks:
      - default
      - kmx-ih_default # provider/consumer EDC 컨테이너와 동일 네트워크
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # /healthz 는 무인증 liveness. 과거 /api/connectors 는 prod 에서 401 → 컨테이너가
      # 영구 unhealthy(Dockerfile HEALTHCHECK 와 드리프트)였다. 무인증 경로로 통일.
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:

networks:
  kmx-ih_default:
    external: true # kmx-provider-controlplane / kmx-consumer-controlplane 이 속한 네트워크
